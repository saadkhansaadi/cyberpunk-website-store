<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoulThread | The Forge - Customization Studio</title>
  <link rel="icon" type="image/svg+xml" href="Assets/favicon.svg">
  <link rel="stylesheet" href="CSS/style.css">
  <link rel="stylesheet" href="CSS/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
        --forge-accent: var(--primary);
    }
    .forge-container {
        display: grid;
        grid-template-columns: 1.5fr 1fr;
        gap: 40px;
        max-width: 1200px;
        margin: 120px auto 60px;
        padding: 20px;
    }
    .forge-preview {
        background: rgba(255,255,255,0.02);
        border: 1px solid var(--border-light);
        border-radius: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        min-height: 600px;
        overflow: hidden;
    }
    .preview-base {
        width: 80%;
        max-width: 500px;
        transition: filter 0.5s ease;
    }
    .patch-overlay {
        position: absolute;
        width: 100px;
        height: 100px;
        pointer-events: none;
        transition: all 0.3s ease;
        opacity: 0;
    }
    .control-panel {
        background: rgba(0,0,0,0.5);
        backdrop-filter: blur(20px);
        border: 1px solid var(--border-light);
        border-radius: 32px;
        padding: 40px;
    }
    .color-swatch {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid transparent;
        transition: 0.3s;
    }
    .color-swatch.active {
        border-color: #fff;
        box-shadow: 0 0 15px var(--forge-accent);
    }
    .patch-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid transparent;
        border-radius: 12px;
        padding: 10px;
        cursor: pointer;
        transition: 0.3s;
        text-align: center;
    }
    .patch-card:hover, .patch-card.active {
        border-color: var(--forge-accent);
        background: rgba(139, 92, 246, 0.1);
    }
    .patch-card img {
        width: 100%;
        border-radius: 8px;
        margin-bottom: 5px;
    }
  </style>
</head>

<body>
  <div id="navbar-placeholder"></div>

  <div class="forge-container">
    
    <!-- PREVIEW AREA -->
    <div class="forge-preview reveal">
        <div style="position: absolute; top: 20px; left: 20px; font-family: 'Space Grotesk'; font-size: 10px; color: var(--primary);">[ PREVIEW_ACTIVE ]</div>
        <img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=800&q=80" id="baseHoodie" class="preview-base" alt="Base Hoodie">
        <img id="activePatch" class="patch-overlay" src="" alt="Patch">
        
        <div style="position: absolute; bottom: 20px; right: 20px; text-align: right;">
            <div style="font-size: 24px; font-weight: 800; color: #fff;">$120.00</div>
            <div style="font-size: 10px; color: var(--text-muted);">CUSTOM_FORGE_PRICE</div>
        </div>
    </div>

    <!-- CONTROL PANEL -->
    <div class="control-panel reveal">
        <h2 style="margin-bottom: 10px;">The <span class="text-gradient">Forge.</span></h2>
        <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 30px;">Assemble your identity. Select base alloy and apply digital art patches.</p>

        <!-- COLOR SELECT -->
        <div style="margin-bottom: 40px;">
            <h4 style="font-size: 12px; letter-spacing: 2px; margin-bottom: 15px; color: #fff;">01. SELECT BASE COLOR</h4>
            <div style="display: flex; gap: 15px;">
                <div class="color-swatch active" style="background: #111;" onclick="setBaseColor('#111', this)"></div>
                <div class="color-swatch" style="background: #8b5cf6;" onclick="setBaseColor('#8b5cf6', this)"></div>
                <div class="color-swatch" style="background: #06b6d4;" onclick="setBaseColor('#06b6d4', this)"></div>
                <div class="color-swatch" style="background: #f43f5e;" onclick="setBaseColor('#f43f5e', this)"></div>
            </div>
        </div>

        <!-- PATCH SELECT -->
        <div style="margin-bottom: 40px;">
            <h4 style="font-size: 12px; letter-spacing: 2px; margin-bottom: 15px; color: #fff;">02. APPLY DIGITAL PATCH</h4>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="patch-card" onclick="applyPatch('https://images.unsplash.com/photo-1614728263952-84ea206f99b6?w=200', this)">
                    <img src="https://images.unsplash.com/photo-1614728263952-84ea206f99b6?w=200">
                    <div style="font-size: 10px;">Neon Pulse</div>
                </div>
                <div class="patch-card" onclick="applyPatch('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=200', this)">
                    <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=200">
                    <div style="font-size: 10px;">Cyber Soul</div>
                </div>
                <div class="patch-card" onclick="applyPatch('https://images.unsplash.com/photo-1633167606207-d840b5070fc2?w=200', this)">
                    <img src="https://images.unsplash.com/photo-1633167606207-d840b5070fc2?w=200">
                    <div style="font-size: 10px;">Grid Core</div>
                </div>
                <div class="patch-card" onclick="applyPatch('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?w=200', this)">
                    <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?w=200">
                    <div style="font-size: 10px;">Void Node</div>
                </div>
            </div>
        </div>

        <button class="btn-pro btn-glow" style="width: 100%; padding: 20px;" onclick="finalizeForge()">INITIALIZE PURCHASE</button>
    </div>

  </div>

  <div id="footer-placeholder"></div>

  <script src="JS files/main.js"></script>
  <script>
    function setBaseColor(color, el) {
        document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
        el.classList.add('active');
        const base = document.getElementById('baseHoodie');
        if(color === '#111') base.style.filter = 'none';
        else base.style.filter = `hue-rotate(180deg) brightness(0.8) sepia(1) saturate(5) hue-rotate(${Math.random()*360}deg)`;
    }

    function applyPatch(src, el) {
        document.querySelectorAll('.patch-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        const patch = document.getElementById('activePatch');
        patch.src = src;
        patch.style.opacity = '1';
        patch.style.top = '45%';
        patch.style.left = '50%';
        patch.style.transform = 'translate(-50%, -50%) rotate(-5deg)';
    }

    function finalizeForge() {
        showToast("Design Finalized. Redirecting to Checkout Node...", "success");
    }
  </script>
</body>

</html>
