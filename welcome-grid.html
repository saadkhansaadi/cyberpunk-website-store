<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to the Grid | SoulThread</title>
  <link rel="icon" type="image/svg+xml" href="Assets/favicon.svg">
  <link rel="stylesheet" href="CSS/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .welcome-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      background: radial-gradient(circle at center, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
    }
    .welcome-box {
      max-width: 600px;
      padding: 60px;
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(20px);
      border: 1px solid var(--primary);
      border-radius: 30px;
      box-shadow: 0 0 50px rgba(139, 92, 246, 0.2);
      animation: zoomIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.9) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .check-icon {
      width: 80px;
      height: 80px;
      background: var(--primary);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin: 0 auto 30px;
      box-shadow: 0 0 30px var(--primary);
      animation: pulse 2s infinite;
    }
  </style>
</head>
<body class="loaded">
  <div id="navbar-placeholder"></div>

  <div class="welcome-container">
    <div class="welcome-box">
      <div class="check-icon">
        <i class="fa-solid fa-check"></i>
      </div>
      <h1 class="text-gradient" style="font-size: 48px; margin-bottom: 20px;">ACCESS GRANTED</h1>
      <p style="font-size: 18px; color: var(--text-muted); margin-bottom: 40px;">
        You have successfully synced with the SoulThread grid. Early access keys and exclusive drops will be delivered to your identifier soon.
      </p>
      <a href="shop.html" class="btn-pro btn-glow">
        <i class="fa-solid fa-bolt"></i> Explore the Collection
      </a>
      <div style="margin-top: 30px;">
        <a href="index.html" style="color: var(--text-muted); text-decoration: none; font-size: 14px;">Return to Terminal</a>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="JS files/main.js"></script>
</body>
</html>
