<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoulThread | Secure Checkout</title>
  <link rel="icon" type="image/svg+xml" href="Assets/favicon.svg">

  <link rel="stylesheet" href="CSS/style.css">
  <link rel="stylesheet" href="CSS/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <style>
    .checkout-grid {
      display: grid;
      grid-template-columns: 2fr 1.2fr;
      gap: 40px;
      max-width: 1200px;
      margin: 100px auto;
      padding: 0 20px;
    }
    .checkout-section {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    .checkout-section h3 {
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 15px;
      margin-bottom: 25px;
      color: var(--primary);
    }
    .form-row {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
    .form-group {
      flex: 1;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-light);
      font-size: 14px;
    }
    .payment-mock {
      background: linear-gradient(135deg, rgba(139,92,246,0.1), rgba(45,212,191,0.1));
      padding: 20px;
      border-radius: 8px;
      border: 1px solid var(--primary);
      position: relative;
      overflow: hidden;
    }
    .summary-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      align-items: center;
    }
    .summary-item img {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 8px;
    }
    
    /* Processing Modal */
    #processingModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(9,9,11,0.95);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
    }
    
    @media (max-width: 900px) {
      .checkout-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <!-- DYNAMIC NAVBAR PLACEHOLDER -->
  <div id="navbar-placeholder"></div>

  <div class="checkout-grid">
    <!-- Left: Forms -->
    <div>
      <h1 style="font-size: 36px; margin-bottom: 30px;">Secure <span class="text-gradient">Checkout</span></h1>
      
      <form id="checkoutForm">
        <!-- Contact & Shipping -->
        <div class="checkout-section" style="margin-bottom: 30px;">
          <h3><i class="fa-solid fa-location-dot"></i> Shipping Protocol</h3>
          
          <div class="form-row">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" class="pro-input" required>
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" class="pro-input" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Signal (Email)</label>
              <input type="email" class="pro-input" required>
            </div>
          </div>

          <div class="form-group" style="margin-bottom: 20px;">
            <label>Physical Address</label>
            <input type="text" class="pro-input" required placeholder="Sector / Street">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>City / Hub</label>
              <input type="text" class="pro-input" required>
            </div>
            <div class="form-group">
              <label>Zip Code</label>
              <input type="text" class="pro-input" required>
            </div>
          </div>
        </div>

        <!-- Payment -->
        <div class="checkout-section">
          <h3><i class="fa-solid fa-credit-card"></i> Payment Gateway</h3>
          
          <div class="payment-mock">
            <div class="form-group" style="margin-bottom: 20px;">
              <label>Card Number</label>
              <input type="text" class="pro-input" placeholder="0000 0000 0000 0000" maxlength="19" required>
            </div>
            <div class="form-row" style="margin-bottom: 0;">
              <div class="form-group">
                <label>Expiry (MM/YY)</label>
                <input type="text" class="pro-input" placeholder="12/25" maxlength="5" required>
              </div>
              <div class="form-group">
                <label>CVC</label>
                <input type="text" class="pro-input" placeholder="123" maxlength="3" required>
              </div>
            </div>
            <i class="fa-brands fa-cc-visa" style="position: absolute; right: 20px; bottom: 20px; font-size: 40px; opacity: 0.5;"></i>
          </div>
        </div>

        <button type="submit" class="btn-pro btn-glow" style="width: 100%; padding: 20px; font-size: 20px; margin-top: 30px;">
          <i class="fa-solid fa-lock"></i> AUTHORIZE TRANSACTION
        </button>
      </form>
    </div>

    <!-- Right: Order Summary -->
    <div>
      <div class="checkout-section" style="position: sticky; top: 100px;">
        <h3>Order Summary</h3>
        <div id="checkoutItemsList" style="max-height: 300px; overflow-y: auto; margin-bottom: 20px; padding-right: 10px;">
          <!-- JS fills this -->
        </div>

        <div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
          <div class="summary-item">
            <span style="color: var(--text-muted);">Subtotal</span>
            <span id="checkoutSubtotal">$0.00</span>
          </div>
          <div class="summary-item">
            <span style="color: var(--text-muted);">Shipping</span>
            <span>$15.00</span>
          </div>
          <div class="summary-item" style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
            <span style="font-size: 20px; font-weight: bold; color: var(--text-light);">Total</span>
            <span id="checkoutTotal" style="font-size: 24px; font-weight: bold; color: var(--primary);">$0.00</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Processing Modal -->
  <div id="processingModal">
    <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 60px; color: var(--primary); margin-bottom: 20px;"></i>
    <h2 style="margin-bottom: 10px;">Establishing Secure Connection...</h2>
    <p style="color: var(--text-muted);" id="processingText">Encrypting payment data...</p>
  </div>

  <!-- DYNAMIC FOOTER PLACEHOLDER -->
  <div id="footer-placeholder"></div>

  <!-- Scripts -->
  <script src="JS files/main.js"></script>
  <script src="JS files/checkout.js"></script>
</body>
</html>
