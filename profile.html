<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoulThread | User Hub</title>
  <link rel="icon" type="image/svg+xml" href="Assets/favicon.svg">

  <link rel="stylesheet" href="CSS/style.css">
  <link rel="stylesheet" href="CSS/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <style>
    .dashboard-grid {
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 40px;
      max-width: 1200px;
      margin: 100px auto;
      padding: 0 20px;
      min-height: 60vh;
    }
    .sidebar-menu { list-style: none; padding: 0; margin: 0; background: rgba(255,255,255,0.02); border: 1px solid rgba(139, 92, 246, 0.2); border-radius: 12px; overflow: hidden; }
    .sidebar-menu li { border-bottom: 1px solid rgba(255,255,255,0.05); }
    .sidebar-menu a { display: block; padding: 20px; color: var(--text-light); text-decoration: none; transition: 0.3s; }
    .sidebar-menu a:hover, .sidebar-menu a.active { background: rgba(139, 92, 246, 0.1); color: var(--primary); border-left: 4px solid var(--primary); }
    .dashboard-panel { background: rgba(255,255,255,0.02); border: 1px solid rgba(139, 92, 246, 0.2); border-radius: 12px; padding: 40px; display: none; }
    .dashboard-panel.active { display: block; animation: fadeIn 0.5s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .order-card { border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
    @media (max-width: 800px) { .dashboard-grid { grid-template-columns: 1fr; } }
  </style>
</head>

<body>

  <!-- DYNAMIC NAVBAR PLACEHOLDER -->
  <div id="navbar-placeholder"></div>

  <div class="dashboard-grid">
    
    <!-- Sidebar -->
    <aside>
      <ul class="sidebar-menu">
        <li><a href="#" class="active" onclick="switchTab('overview', this)"><i class="fa-solid fa-id-badge" style="width: 25px;"></i> Hub Overview</a></li>
        <li><a href="#" onclick="switchTab('orders', this)"><i class="fa-solid fa-box" style="width: 25px;"></i> Order History</a></li>
        <li><a href="#" onclick="switchTab('wishlist', this)"><i class="fa-solid fa-heart" style="width: 25px;"></i> Wishlist</a></li>
        <li><a href="#" onclick="switchTab('settings', this)"><i class="fa-solid fa-gear" style="width: 25px;"></i> System Settings</a></li>
        <li><a href="#" onclick="logout()"><i class="fa-solid fa-power-off" style="width: 25px; color: #ef4444;"></i> Disconnect</a></li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main>
      
      <!-- Overview Panel -->
      <div id="overview" class="dashboard-panel active">
        <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px;">
          <img src="https://ui-avatars.com/api/?name=Operative&background=8b5cf6&color=fff&size=80" id="userAvatar" alt="User" style="border-radius: 50%; border: 2px solid var(--primary);">
          <div>
            <h2 style="margin: 0; color: var(--text-light);">Welcome back, <span id="userNameDisplay" class="text-gradient">Operative</span>.</h2>
            <p style="color: var(--text-muted); margin: 5px 0 0;"><i class="fa-solid fa-shield-check" style="color: var(--secondary);"></i> Verified Identity</p>
          </div>
        </div>
        
        <p style="color: var(--text-muted); margin-bottom: 30px;">Your secure connection to the SoulThread grid is active.</p>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;">
          <div style="background: rgba(139, 92, 246, 0.1); border: 1px solid var(--primary); padding: 25px; border-radius: 12px; text-align: center; cursor: pointer;" onclick="switchTab('orders', document.querySelector('.sidebar-menu a:nth-child(2)'))">
            <i class="fa-solid fa-box-open" style="font-size: 28px; color: var(--primary); margin-bottom: 12px;"></i>
            <h4 style="font-size:14px;">Orders</h4>
            <p style="font-size: 32px; color: #fff; margin: 8px 0 0; font-weight: bold;" id="orderCount">0</p>
          </div>
          <div style="background: rgba(16,185,129,0.1); border: 1px solid var(--accent); padding: 25px; border-radius: 12px; text-align: center; cursor: pointer;" onclick="switchTab('wishlist', document.querySelector('.sidebar-menu a:nth-child(3)'))">
            <i class="fa-solid fa-heart" style="font-size: 28px; color: var(--accent); margin-bottom: 12px;"></i>
            <h4 style="font-size:14px;">Wishlist</h4>
            <p style="font-size: 32px; color: #fff; margin: 8px 0 0; font-weight: bold;" id="wishlistCountProfile">0</p>
          </div>
          <div style="background: rgba(59,130,246,0.1); border: 1px solid var(--secondary); padding: 25px; border-radius: 12px; text-align: center;">
            <i class="fa-solid fa-image" style="font-size: 28px; color: var(--secondary); margin-bottom: 12px;"></i>
            <h4 style="font-size:14px;">Digital Assets</h4>
            <p style="font-size: 32px; color: #fff; margin: 8px 0 0; font-weight: bold;" id="digitalCount">0</p>
          </div>
        </div>
      </div>

      <!-- Orders Panel -->
      <div id="orders" class="dashboard-panel">
        <h2 style="margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;"><i class="fa-solid fa-truck-fast" style="margin-right: 10px;"></i> Order History</h2>
        <div id="orders-list"></div>
      </div>

      <!-- Wishlist Panel -->
      <div id="wishlist" class="dashboard-panel">
        <h2 style="margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;"><i class="fa-solid fa-heart" style="margin-right: 10px;"></i> Your Wishlist</h2>
        <div id="wishlist-grid" class="grid"></div>
      </div>

      <!-- Settings Panel -->
      <div id="settings" class="dashboard-panel">
        <h2 style="margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;"><i class="fa-solid fa-user-shield" style="margin-right: 10px;"></i> Identity Settings</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
          <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 10px; color: var(--text-light);">Registered Signal (Email)</label>
            <input type="email" class="pro-input" id="settingsEmail" readonly style="opacity: 0.5; cursor: not-allowed;">
          </div>
          <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 10px; color: var(--text-light);">Display Alias</label>
            <input type="text" class="pro-input" id="settingsName">
          </div>
        </div>
        <div style="margin-bottom: 30px;">
          <label style="display: block; margin-bottom: 10px; color: var(--text-light);">Shipping Hub Address</label>
          <input type="text" class="pro-input" placeholder="e.g. 104 Neon St, Sector 7">
        </div>
        <button class="btn-pro btn-glow" style="padding: 15px 30px; font-size: 16px;" onclick="showToast('Identity Updated Successfully.', 'success')"><i class="fa-solid fa-floppy-disk"></i> Save Changes</button>
      </div>

    </main>

  </div>

  <!-- DYNAMIC FOOTER PLACEHOLDER -->
  <div id="footer-placeholder"></div>

  <!-- Scripts -->
  <script src="JS files/main.js"></script>
  <script src="JS files/products.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Auth Guard
      const authData = localStorage.getItem('userAuth');
      if (!authData) {
        window.location.href = "login.html";
        return;
      }

      const user = JSON.parse(authData);
      document.getElementById('userNameDisplay').innerText = user.name;
      document.getElementById('settingsName').value = user.name;
      document.getElementById('settingsEmail').value = user.email;
      document.getElementById('userAvatar').src = `https://ui-avatars.com/api/?name=${user.name}&background=8b5cf6&color=fff&size=80`;

      // Load dynamic data
      renderOrders();
      renderWishlistTab();
      updateOverviewStats();

      // Check URL hash for direct tab access
      const hash = window.location.hash.replace('#', '');
      if (hash && document.getElementById(hash)) {
        switchTab(hash, null);
      }
    });

    function switchTab(tabId, element) {
      document.querySelectorAll('.dashboard-panel').forEach(p => p.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      document.querySelectorAll('.sidebar-menu a').forEach(a => a.classList.remove('active'));
      if (element) element.classList.add('active');

      if (tabId === 'wishlist') renderWishlistTab();
      if (tabId === 'orders') renderOrders();
    }

    function logout() {
      localStorage.removeItem('userAuth');
      window.location.href = "login.html";
    }

    // ===== DYNAMIC ORDERS =====
    function renderOrders() {
      const container = document.getElementById('orders-list');
      const orders = JSON.parse(localStorage.getItem('soulthread_orders')) || [];

      if (orders.length === 0) {
        container.innerHTML = `
          <div style="text-align:center;padding:40px;color:var(--text-muted);">
            <i class="fa-solid fa-box-open" style="font-size:40px;margin-bottom:15px;opacity:0.3;"></i>
            <h3>No orders yet</h3>
            <p style="margin-top:10px;">Start shopping to see your orders here.</p>
            <a href="shop.html" class="btn-pro btn-outline" style="margin-top:20px;display:inline-block;">Browse Shop</a>
          </div>`;
        return;
      }

      const statusColors = {
        processing: { bg: 'rgba(234,179,8,0.2)', color: '#eab308', icon: 'fa-spinner fa-spin', label: 'Processing' },
        confirmed: { bg: 'rgba(59,130,246,0.2)', color: '#3b82f6', icon: 'fa-circle-check', label: 'Confirmed' },
        transit: { bg: 'rgba(139,92,246,0.2)', color: '#8b5cf6', icon: 'fa-truck', label: 'In Transit' },
        delivered: { bg: 'rgba(16,185,129,0.2)', color: '#10b981', icon: 'fa-check', label: 'Delivered' }
      };

      container.innerHTML = orders.map(order => {
        const st = statusColors[order.status] || statusColors.processing;
        const date = new Date(order.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        const itemNames = order.items.map(i => `${i.quantity}x ${i.name}`).join(', ');

        return `
          <div class="order-card" style="background:rgba(0,0,0,0.3);border-left:4px solid ${st.color};">
            <div style="flex:1;min-width:200px;">
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
                <span style="background:${st.bg};color:${st.color};padding:5px 12px;border-radius:20px;font-size:12px;font-weight:bold;text-transform:uppercase;">
                  <i class="fa-solid ${st.icon}"></i> ${st.label}
                </span>
                <span style="color:var(--text-muted);font-size:14px;">${date}</span>
              </div>
              <h3 style="margin:5px 0;font-size:18px;">Order ${order.id}</h3>
              <p style="color:var(--text-muted);font-size:14px;margin:0;">${itemNames}</p>
            </div>
            <div style="text-align:right;">
              <p style="font-size:22px;font-weight:bold;color:#fff;margin:0 0 5px;">$${order.total.toFixed(2)}</p>
            </div>
          </div>`;
      }).join('');
    }

    // ===== WISHLIST TAB =====
    function renderWishlistTab() {
      const grid = document.getElementById('wishlist-grid');
      const wishlist = JSON.parse(localStorage.getItem('soulthread_wishlist')) || [];

      if (wishlist.length === 0) {
        grid.innerHTML = `
          <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);">
            <i class="fa-solid fa-heart" style="font-size:40px;margin-bottom:15px;opacity:0.3;"></i>
            <h3>Wishlist is empty</h3>
            <p style="margin-top:10px;">Heart items to save them here.</p>
          </div>`;
        return;
      }

      grid.innerHTML = wishlist.map(id => {
        const prod = getProductById(id);
        if (!prod) return '';
        const price = prod.starting_price ? `From $${prod.starting_price.toFixed(2)}` : `$${prod.price.toFixed(2)}`;
        return `
          <div class="pro-card" style="position:relative;">
            <img src="${prod.image}" alt="${prod.name}" onclick="location.href='product.html?id=${prod.id}'" style="cursor:pointer;">
            <h3>${prod.name}</h3>
            <p style="color:var(--text-light);font-size:18px;font-weight:600;">${price}</p>
            <div style="display:flex;gap:10px;margin-top:auto;">
              <button class="btn-pro btn-glow" style="flex:1;padding:10px;font-size:13px;" onclick="moveToCart('${prod.id}')">
                <i class="fa-solid fa-cart-plus"></i> Add to Cart
              </button>
              <button class="btn-pro btn-outline" style="padding:10px 15px;font-size:13px;" onclick="removeFromWishlist('${prod.id}')">
                <i class="fa-solid fa-trash"></i>
              </button>
            </div>
          </div>`;
      }).join('');
    }

    function moveToCart(productId) {
      const prod = getProductById(productId);
      if (!prod) return;
      let cart = JSON.parse(localStorage.getItem('soulthread_cart')) || [];
      const existing = cart.find(i => i.id === productId);
      if (existing) { existing.quantity += 1; }
      else { cart.push({ id: prod.id, name: prod.name, price: prod.price, image: prod.image, quantity: 1, product_type: prod.product_type }); }
      localStorage.setItem('soulthread_cart', JSON.stringify(cart));
      updateCartCountUI();
      removeFromWishlist(productId);
      showToast(`${prod.name} moved to cart!`, 'success');
    }

    function removeFromWishlist(productId) {
      let wishlist = JSON.parse(localStorage.getItem('soulthread_wishlist')) || [];
      wishlist = wishlist.filter(id => id !== productId);
      localStorage.setItem('soulthread_wishlist', JSON.stringify(wishlist));
      renderWishlistTab();
      updateOverviewStats();
    }

    function updateOverviewStats() {
      const orders = JSON.parse(localStorage.getItem('soulthread_orders')) || [];
      const wishlist = JSON.parse(localStorage.getItem('soulthread_wishlist')) || [];
      document.getElementById('orderCount').textContent = orders.length;
      document.getElementById('wishlistCountProfile').textContent = wishlist.length;
      const digitalOrders = orders.filter(o => o.items.some(i => i.product_type === 'print' || i.product_type === 'service'));
      document.getElementById('digitalCount').textContent = digitalOrders.length;
    }
  </script>
</body>
</html>
